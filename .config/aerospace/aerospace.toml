# It's not necessary to copy all keys to your config.
# If the key is missing in your config, "default-config.toml" will serve as a fallback

config-version = 2

# You can use it to add commands that run after login to macOS user session.
# 'start-at-login' needs to be 'true' for 'after-login-command' to work
# Available commands: https://nikitabobko.github.io/AeroSpace/commands
after-login-command = []

# You can use it to add commands that run after AeroSpace startups
# 'after-startup-command' is run after 'after-login-command'
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = [
    'exec-and-forget borders active_color=0xff659DDA inactive_color=0x33494d64 width=3.0 blur_radius=10',
    'exec-and-forget sketchybar'
]

# Start AeroSpace at login
start-at-login = true

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = false

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 30

# Possible values: tiles|accordion
default-root-container-layout = 'accordion'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'vertical'

# Possible values: (qwerty|dvorak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
key-mapping.preset = 'qwerty'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
exec-on-workspace-change = ['/bin/sh', '-c', '$HOME/.config/sketchybar/plugins/space.sh && $HOME/.config/sketchybar/plugins/space_windows.sh']

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top =       40
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See: https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
inner.horizontal = 8
inner.vertical =   8
outer.left =       8
outer.bottom =     8
outer.top =        48
outer.right =      8

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
[mode.main.binding]

# All possible keys:
# - Letters.        a, b, c, ..., z
# - Numbers.        0, 1, 2, ..., 9
# - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
# - F-keys.         f1, f2, ..., f20
# - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon, backtick,
#                   leftSquareBracket, rightSquareBracket, space, enter, esc, backspace, tab
# - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
#                   keypadMinus, keypadMultiply, keypadPlus
# - Arrows.         left, down, up, right

# All possible modifiers: cmd, alt, ctrl, shift

# All possible commands: https://nikitabobko.github.io/AeroSpace/commands

# See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
# You can uncomment the following lines to open up terminal with alt + enter shortcut (like in i3)
# alt-enter = '''exec-and-forget osascript -e '
# tell application "Terminal"
#     do script
#     activate
# end tell'
# '''

# See: https://nikitabobko.github.io/AeroSpace/commands#layout
alt-cmd-enter = 'layout tiles horizontal vertical'
alt-shift-enter = 'layout accordion horizontal vertical'
cmd-alt-shift-enter = 'flatten-workspace-tree'
f3 = 'move-mouse window-force-center'
alt-f3 = 'move-mouse monitor-force-center'

# See: https://nikitabobko.github.io/AeroSpace/commands#focus
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# See: https://nikitabobko.github.io/AeroSpace/commands#move
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# See: https://nikitabobko.github.io/AeroSpace/commands#join-with
ctrl-alt-shift-h = 'exec-and-forget $HOME/.local/bin/aerospace-smart-join.zsh left'
ctrl-alt-shift-j = 'exec-and-forget $HOME/.local/bin/aerospace-smart-join.zsh down'
ctrl-alt-shift-k = 'exec-and-forget $HOME/.local/bin/aerospace-smart-join.zsh up'
ctrl-alt-shift-l = 'exec-and-forget $HOME/.local/bin/aerospace-smart-join.zsh right'

# See: https://nikitabobko.github.io/AeroSpace/commands#resize
alt-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'
alt-equal = 'balance-sizes'

alt-5 = 'resize width -50'
alt-8 = 'resize width +50'

alt-6 = 'resize height -50'
alt-9 = 'resize height +50'

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace
alt-a = 'workspace A' # In your config, you can drop workspace bindings that you don't need
alt-b = 'workspace B'
alt-d = 'workspace D'
alt-f = 'workspace F'
alt-g = 'workspace G'
alt-m = 'workspace M'
alt-o = 'workspace O'
alt-p = 'workspace P'
alt-q = 'workspace Q'
alt-r = 'workspace R'
alt-s = 'workspace S'
alt-t = 'workspace T'
alt-u = 'workspace U'
alt-v = 'workspace V'
alt-x = 'workspace X'
alt-y = 'workspace Y'
alt-z = 'workspace Z'

# See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
alt-shift-a = ['move-node-to-workspace A', "workspace A"]
alt-shift-b = ['move-node-to-workspace B', "workspace B"]
alt-shift-d = ['move-node-to-workspace D', "workspace D"]
alt-shift-f = ['move-node-to-workspace F', "workspace F"]
alt-shift-g = ['move-node-to-workspace G', "workspace G"]
alt-shift-m = ['move-node-to-workspace M', "workspace M"]
alt-shift-o = ['move-node-to-workspace O', "workspace O"]
alt-shift-p = ['move-node-to-workspace P', "workspace P"]
alt-shift-q = ['move-node-to-workspace Q', "workspace Q"]
alt-shift-r = ['move-node-to-workspace R', "workspace R"]
alt-shift-s = ['move-node-to-workspace S', "workspace S"]
alt-shift-t = ['move-node-to-workspace T', "workspace T"]
alt-shift-u = ['move-node-to-workspace U', "workspace U"]
alt-shift-v = ['move-node-to-workspace V', "workspace V"]
alt-shift-x = ['move-node-to-workspace X', "workspace X"]
alt-shift-y = ['move-node-to-workspace Y', "workspace Y"]
alt-shift-z = ['move-node-to-workspace Z', "workspace Z"]

# See: https://nikitabobko.github.io/AeroSpace/commands#focus-back-and-forth
alt-leftSquareBracket = 'focus-back-and-forth'
# See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
alt-rightSquareBracket = 'workspace-back-and-forth'

# See: https://nikitabobko.github.io/AeroSpace/commands#mode
alt-esc = 'mode service'
ctrl-alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main'] # reset layout
#s = ['layout sticky tiling', 'mode main'] # sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
m = ['fullscreen', 'mode main'] # Toggle between floating and tiling layout
backspace = ['close-all-windows-but-current', 'mode main']

alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']

[[on-window-detected]]
if.app-id = 'com.google.Chrome.app.picebhhlijnlefeleilfbanaghjlkkna'
run = 'layout floating'
